name: Bootstrap Terraform State Backend

on:
  workflow_dispatch:  # Manual trigger only - run this ONCE

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  TF_STATE_BUCKET: onedata-task4-tfstate-venkat
  TF_STATE_DYNAMODB: onedata-task4-tfstate-lock

jobs:
  bootstrap:
    name: Create S3 + DynamoDB for Terraform State
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 bucket for Terraform state
        run: |
          if aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "✅ S3 bucket '$TF_STATE_BUCKET' already exists, skipping."
          else
            echo "==> Creating S3 bucket: $TF_STATE_BUCKET"
            aws s3api create-bucket \
              --bucket "$TF_STATE_BUCKET" \
              --region "$AWS_REGION"
            echo "✅ S3 bucket created."
          fi

      - name: Enable versioning on S3 bucket
        run: |
          aws s3api put-bucket-versioning \
            --bucket "$TF_STATE_BUCKET" \
            --versioning-configuration Status=Enabled
          echo "✅ Versioning enabled."

      - name: Enable server-side encryption on S3 bucket
        run: |
          aws s3api put-bucket-encryption \
            --bucket "$TF_STATE_BUCKET" \
            --server-side-encryption-configuration '{
              "Rules": [{
                "ApplyServerSideEncryptionByDefault": {
                  "SSEAlgorithm": "AES256"
                }
              }]
            }'
          echo "✅ Encryption enabled."

      - name: Block public access on S3 bucket
        run: |
          aws s3api put-public-access-block \
            --bucket "$TF_STATE_BUCKET" \
            --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          echo "✅ Public access blocked."

      - name: Create DynamoDB table for state locking
        run: |
          if aws dynamodb describe-table --table-name "$TF_STATE_DYNAMODB" 2>/dev/null; then
            echo "✅ DynamoDB table '$TF_STATE_DYNAMODB' already exists, skipping."
          else
            echo "==> Creating DynamoDB table: $TF_STATE_DYNAMODB"
            aws dynamodb create-table \
              --table-name "$TF_STATE_DYNAMODB" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            echo "✅ DynamoDB table created."
          fi

      - name: Bootstrap complete
        run: |
          echo ""
          echo "======================================"
          echo "✅ Bootstrap complete!"
          echo "S3 Bucket  : $TF_STATE_BUCKET"
          echo "DynamoDB   : $TF_STATE_DYNAMODB"
          echo "Region     : $AWS_REGION"
          echo ""
          echo "You can now trigger the Terraform workflow."
          echo "======================================"
