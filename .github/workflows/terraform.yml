name: Terraform - Aurora Infrastructure

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'lambda/**'
      - '.github/workflows/terraform.yml'

  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'apply'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_STATE_BUCKET: onedata-task4-tfstate-venkat
  TF_STATE_DYNAMODB: onedata-task4-tfstate-lock
  TF_VERSION: 1.7.5

jobs:
  # -------------------------------------------------------
  # Terraform Plan — runs on every PR
  # -------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Build lambda_bundle/ so Terraform archive_file source_dir works
      - name: Build Lambda bundle with psycopg2
        run: |
          mkdir -p lambda_bundle
          pip3 install psycopg2-binary \
            --platform manylinux2014_x86_64 \
            --target lambda_bundle \
            --only-binary=:all: \
            --quiet
          cp lambda/aurora_connector.py lambda_bundle/lambda_function.py
          echo "✅ Bundle ready. Files: $(ls lambda_bundle | wc -l)"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=task4/aurora/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_STATE_DYNAMODB }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "PLAN_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... [truncated]'
              : planOutput;
            const body = `## 🔍 Terraform Plan Results
            | Step | Status |
            |------|--------|
            | Format   | ${{ steps.fmt.outcome == 'success' && '✅' || '⚠️' }} \`${{ steps.fmt.outcome }}\` |
            | Init     | ${{ steps.init.outcome == 'success' && '✅' || '❌' }} \`${{ steps.init.outcome }}\` |
            | Validate | ${{ steps.validate.outcome == 'success' && '✅' || '❌' }} \`${{ steps.validate.outcome }}\` |
            | Plan     | ${{ steps.plan.outcome == 'success' && '✅' || '❌' }} \`${{ steps.plan.outcome }}\` |
            <details><summary>📋 Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>
            > Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: env.PLAN_EXIT_CODE != '0'
        run: exit 1

  # -------------------------------------------------------
  # Terraform Apply — manual dispatch only
  # -------------------------------------------------------
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Bundle psycopg2 + connector into lambda_bundle/
      # Terraform zips this directory via archive_file source_dir
      - name: Build Lambda bundle with psycopg2
        run: |
          mkdir -p lambda_bundle
          pip3 install psycopg2-binary \
            --platform manylinux2014_x86_64 \
            --target lambda_bundle \
            --only-binary=:all: \
            --quiet
          cp lambda/aurora_connector.py lambda_bundle/lambda_function.py
          echo "✅ Lambda bundle contents:"
          ls lambda_bundle/
          echo "✅ psycopg2 present: $(ls lambda_bundle/ | grep psycopg2)"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=task4/aurora/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_STATE_DYNAMODB }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Show Outputs
        run: terraform output

      - name: Invoke Lambda to verify DB connection
        run: |
          LAMBDA_NAME=$(terraform output -raw lambda_function_name)
          echo "==> Invoking Lambda: $LAMBDA_NAME"
          sleep 5

          aws lambda invoke \
            --function-name "$LAMBDA_NAME" \
            --region "$AWS_REGION" \
            --log-type Tail \
            response.json | tee invoke_result.json

          echo ""
          echo "==> Lambda response:"
          cat response.json

          # Decode CloudWatch logs from response for debugging
          LOG_RESULT=$(python3 -c "
          import sys, json, base64
          d = json.load(open('invoke_result.json'))
          print(base64.b64decode(d.get('LogResult','')).decode())
          " 2>/dev/null || echo "Could not decode logs")
          echo ""
          echo "==> Lambda logs:"
          echo "$LOG_RESULT"

          if grep -q "SUCCESS" response.json; then
            echo ""
            echo "✅ Lambda successfully connected to RDS PostgreSQL!"
          else
            echo "❌ Lambda did not return SUCCESS."
            exit 1
          fi

      - name: Print CloudWatch log group URL
        run: |
          LOG_GROUP=$(terraform output -raw cloudwatch_log_group)
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$LOG_GROUP', safe=''))")
          echo ""
          echo "📋 CloudWatch logs:"
          echo "https://console.aws.amazon.com/cloudwatch/home?region=$AWS_REGION#logsV2:log-groups/log-group/$ENCODED"

  # -------------------------------------------------------
  # Terraform Destroy — manual dispatch only
  # -------------------------------------------------------
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Need lambda_bundle/ present so Terraform can read archive_file source_dir
      - name: Build Lambda bundle (needed for destroy plan)
        run: |
          mkdir -p lambda_bundle
          cp lambda/aurora_connector.py lambda_bundle/lambda_function.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=task4/aurora/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_STATE_DYNAMODB }}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Destroy complete
        run: echo "✅ All infrastructure destroyed successfully."
